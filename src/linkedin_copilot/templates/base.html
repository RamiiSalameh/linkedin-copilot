<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Copilot</title>
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%233b82f6'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M8 10h6v12H8zM16 10h8l-4 6 4 6h-8l4-6z' fill='white'/%3E%3C/svg%3E">
    
    <style>
      /* ========================================
         DESIGN TOKENS (CSS Variables)
         ======================================== */
      :root {
        /* Colors - Refined dark palette */
        --bg-base: #050810;
        --bg-primary: #0a0f1a;
        --bg-secondary: #0f172a;
        --bg-card: #131c2e;
        --bg-elevated: #1a2642;
        --bg-hover: #243352;
        
        /* Borders */
        --border-subtle: #1e293b;
        --border-default: #334155;
        --border-focus: #3b82f6;
        
        /* Text */
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #64748b;
        --text-inverse: #0f172a;
        
        /* Accents */
        --accent-primary: #3b82f6;
        --accent-primary-hover: #2563eb;
        --accent-success: #22c55e;
        --accent-success-muted: rgba(34, 197, 94, 0.15);
        --accent-warning: #f59e0b;
        --accent-warning-muted: rgba(245, 158, 11, 0.15);
        --accent-danger: #ef4444;
        --accent-danger-muted: rgba(239, 68, 68, 0.15);
        --accent-info: #06b6d4;
        --accent-purple: #8b5cf6;
        
        /* Gradients */
        --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        --gradient-glow: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        
        /* Spacing scale */
        --space-xs: 0.25rem;
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --space-lg: 1.5rem;
        --space-xl: 2rem;
        --space-2xl: 3rem;
        
        /* Typography */
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        --text-xs: 0.75rem;
        --text-sm: 0.875rem;
        --text-base: 1rem;
        --text-lg: 1.125rem;
        --text-xl: 1.25rem;
        --text-2xl: 1.5rem;
        --line-height-tight: 1.25;
        --line-height-normal: 1.5;
        --line-height-relaxed: 1.625;
        
        /* Border Radius */
        --radius-sm: 0.375rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --radius-xl: 1rem;
        --radius-full: 9999px;
        
        /* Shadows */
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
        --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.3);
        
        /* Transitions */
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ========================================
         RESET & BASE STYLES
         ======================================== */
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      body {
        font-family: var(--font-sans);
        font-size: var(--text-base);
        line-height: var(--line-height-normal);
        margin: 0;
        padding: 0;
        background: var(--bg-base);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ========================================
         SIDEBAR & LAYOUT
         ======================================== */
      .app-layout {
        display: flex;
        min-height: 100vh;
      }
      
      .sidebar {
        width: 260px;
        flex-shrink: 0;
        background: var(--bg-primary);
        border-right: 1px solid var(--border-subtle);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 200;
        overflow-y: auto;
      }
      
      .sidebar-header {
        padding: var(--space-lg);
        border-bottom: 1px solid var(--border-subtle);
      }
      
      .logo-link {
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        transition: opacity 0.2s ease;
      }
      
      .logo-link:hover {
        opacity: 0.8;
      }
      
      .logo-icon {
        width: 28px;
        height: 28px;
        background: var(--gradient-primary);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.025em;
      }
      
      .sidebar-header h1 {
        margin: 0;
        font-size: var(--text-xl);
        font-weight: 700;
      }
      
      .sidebar-nav {
        padding: var(--space-md);
        flex: 1;
      }
      
      .nav-group {
        margin-bottom: var(--space-lg);
      }
      
      .nav-group-title {
        font-size: var(--text-xs);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        padding: var(--space-xs) var(--space-sm);
        margin-bottom: var(--space-xs);
      }
      
      .nav-group a {
        display: block;
        padding: var(--space-sm) var(--space-md);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: var(--radius-md);
        transition: all var(--transition-fast);
        margin-bottom: 2px;
      }
      
      .nav-group a:hover {
        color: var(--text-primary);
        background: var(--bg-hover);
      }
      
      .nav-group a.active {
        color: var(--accent-primary);
        background: rgba(59, 130, 246, 0.1);
      }
      
      .nav-group-sub a {
        padding-left: var(--space-xl);
        font-size: var(--text-sm);
        color: var(--text-secondary);
      }
      
      .nav-group-sub a:hover {
        color: var(--text-primary);
      }
      
      .nav-group-sub a.active {
        color: var(--accent-primary);
      }
      
      .nav-group a:focus-visible,
      .sidebar-toggle:focus-visible,
      .logo-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px var(--accent-primary);
      }
      
      .sidebar-toggle {
        display: none;
        position: fixed;
        top: var(--space-md);
        left: var(--space-md);
        z-index: 300;
        width: 44px;
        height: 44px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        background: var(--bg-card);
        color: var(--text-primary);
        cursor: pointer;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-md);
      }
      
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 199;
      }
      
      .skip-link {
        position: absolute;
        top: -100px;
        left: var(--space-md);
        padding: var(--space-sm) var(--space-md);
        background: var(--accent-primary);
        color: var(--text-inverse);
        font-weight: 600;
        border-radius: var(--radius-md);
        z-index: 1000;
        transition: top var(--transition-fast);
      }
      .skip-link:focus {
        top: var(--space-md);
      }
      
      .app-main {
        flex: 1;
        margin-left: 260px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      
      main {
        flex: 1;
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        padding: var(--space-xl);
      }

      /* ========================================
         MAIN CONTENT (legacy main styles kept above)
         ======================================== */

      /* ========================================
         LINKS
         ======================================== */
      a {
        color: var(--accent-primary);
        text-decoration: none;
        transition: color var(--transition-fast);
      }
      
      a:hover {
        color: var(--accent-primary-hover);
        text-decoration: underline;
      }
      
      a:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--accent-primary);
        border-radius: var(--radius-sm);
      }

      /* ========================================
         CARDS
         ======================================== */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-subtle);
        padding: var(--space-lg);
        margin-bottom: var(--space-lg);
        box-shadow: var(--shadow-md);
        transition: transform var(--transition-normal), box-shadow var(--transition-normal);
      }
      
      .card:hover {
        box-shadow: var(--shadow-lg);
      }
      
      .card h2 {
        margin: 0 0 var(--space-sm) 0;
        font-size: var(--text-lg);
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      /* ========================================
         BUTTONS
         ======================================== */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-sm);
        padding: var(--space-sm) var(--space-lg);
        border-radius: var(--radius-md);
        border: none;
        background: var(--gradient-primary);
        color: white;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: var(--text-sm);
        cursor: pointer;
        transition: all var(--transition-fast);
        box-shadow: var(--shadow-sm);
      }
      
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md), var(--shadow-glow);
      }
      
      .btn:active {
        transform: translateY(0) scale(0.98);
      }
      
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      
      .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px var(--accent-primary);
      }
      
      .btn-secondary {
        background: var(--bg-elevated);
        border: 1px solid var(--border-default);
        color: var(--text-primary);
      }
      
      .btn-secondary:hover {
        background: var(--bg-hover);
        box-shadow: var(--shadow-md);
      }
      
      .btn-danger {
        background: var(--accent-danger);
      }
      
      .btn-success {
        background: var(--accent-success);
      }

      /* ========================================
         FORM ELEMENTS
         ======================================== */
      label {
        display: block;
        margin-bottom: var(--space-sm);
        font-size: var(--text-sm);
        font-weight: 500;
        color: var(--text-secondary);
      }
      
      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="number"],
      input[type="file"],
      select,
      textarea {
        width: 100%;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-subtle);
        background: var(--bg-primary);
        color: var(--text-primary);
        padding: var(--space-sm) var(--space-md);
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        transition: all var(--transition-fast);
      }
      
      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus,
      input[type="number"]:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      }
      
      input[type="text"]::placeholder,
      textarea::placeholder {
        color: var(--text-muted);
      }
      
      textarea {
        min-height: 160px;
        resize: vertical;
        line-height: var(--line-height-relaxed);
      }
      
      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent-primary);
        cursor: pointer;
      }
      
      form {
        margin-top: var(--space-md);
      }

      /* ========================================
         TABLES
         ======================================== */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--text-sm);
      }
      
      th, td {
        padding: var(--space-sm) var(--space-md);
        border-bottom: 1px solid var(--border-subtle);
        text-align: left;
      }
      
      th {
        color: var(--text-muted);
        font-weight: 500;
        font-size: var(--text-xs);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: var(--bg-primary);
        position: sticky;
        top: 0;
      }
      
      tbody tr {
        transition: background var(--transition-fast);
      }
      
      tbody tr:hover {
        background: var(--bg-hover);
      }

      /* ========================================
         BADGES & PILLS
         ======================================== */
      .pill {
        display: inline-flex;
        align-items: center;
        padding: var(--space-xs) var(--space-sm);
        border-radius: var(--radius-full);
        background: var(--accent-warning);
        color: var(--text-inverse);
        font-size: var(--text-xs);
        font-weight: 600;
      }

      .nav-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        padding: 0 6px;
        margin-left: var(--space-xs);
        border-radius: var(--radius-full);
        background: var(--accent-primary);
        color: var(--text-inverse);
        font-size: 0.7rem;
        font-weight: 600;
        line-height: 1.6;
      }

      /* Notification strip: next-best-action (sidebar) */
      .notification-strip {
        padding: var(--space-md);
        border-bottom: 1px solid var(--border-subtle);
        background: var(--bg-card);
        display: none;
      }
      .notification-strip.visible {
        display: block;
      }
      .notification-strip[aria-live="polite"] {
        /* Container for dynamic content updates */
      }
      .notification-strip .notification-strip-message {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        margin-bottom: var(--space-sm);
        line-height: var(--line-height-normal);
      }
      .notification-strip .notification-strip-cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-md);
        border: none;
        background: var(--gradient-primary);
        color: white;
        font-family: var(--font-sans);
        font-weight: 600;
        font-size: var(--text-sm);
        text-decoration: none;
        cursor: pointer;
        transition: all var(--transition-fast);
        box-shadow: var(--shadow-sm);
      }
      .notification-strip .notification-strip-cta:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-md), var(--shadow-glow);
        color: white;
      }
      .notification-strip .notification-strip-cta:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px var(--accent-primary);
      }

      /* ========================================
         UTILITIES
         ======================================== */
      .muted {
        color: var(--text-muted);
        font-size: var(--text-sm);
      }
      
      .text-success { color: var(--accent-success); }
      .text-warning { color: var(--accent-warning); }
      .text-danger { color: var(--accent-danger); }
      
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--space-lg);
      }

      /* ========================================
         JOB PROGRESS (unified component)
         ======================================== */
      .job-progress {
        margin-bottom: var(--space-lg);
        padding: var(--space-md) var(--space-lg);
        border-radius: var(--radius-lg);
        animation: slideUp var(--transition-normal) ease-out;
      }
      .job-progress--banner {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
        border: 1px solid var(--accent-primary);
      }
      .job-progress--purple {
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        border-color: var(--accent-purple);
      }
      .job-progress--purple .job-progress__text,
      .job-progress--purple .job-progress__detail { color: var(--accent-purple); }
      .job-progress--purple .job-progress__bar { background: var(--accent-purple); }
      .job-progress--warning {
        background: var(--accent-warning-muted);
        border-color: var(--accent-warning);
      }
      .job-progress--warning .job-progress__text,
      .job-progress--warning .job-progress__detail { color: var(--accent-warning); }
      .job-progress__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-sm);
      }
      .job-progress__text {
        color: var(--accent-primary);
        font-weight: 500;
      }
      .job-progress__title { font-weight: 700; }
      .job-progress__count {
        opacity: 0.9;
        margin-left: var(--space-xs);
      }
      .job-progress__stop {
        padding: var(--space-xs) var(--space-md);
        font-size: var(--text-sm);
      }
      .job-progress__bar-container {
        height: 8px;
        background: var(--bg-primary);
        border-radius: var(--radius-full);
        overflow: hidden;
        margin-top: var(--space-sm);
      }
      .job-progress__bar {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-primary), var(--accent-purple));
        border-radius: var(--radius-full);
        transition: width 0.3s ease-out;
        position: relative;
        overflow: hidden;
      }
      .job-progress__bar::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
        background-size: 200% 100%;
      }
      .job-progress__bar.job-progress__bar--scraping {
        background: linear-gradient(90deg, var(--accent-purple), #a78bfa);
      }
      .job-progress__detail {
        margin: var(--space-sm) 0 0 0;
        font-size: var(--text-sm);
        color: var(--accent-primary);
        opacity: 0.9;
      }
      .job-progress__detail--secondary {
        margin-top: var(--space-xs);
        color: var(--accent-success);
      }

      /* ========================================
         ANIMATIONS
         ======================================== */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      
      .animate-fade-in {
        animation: fadeIn var(--transition-normal) ease-out;
      }
      
      .animate-slide-up {
        animation: slideUp var(--transition-normal) ease-out;
      }

      /* ========================================
         REDUCED MOTION
         ======================================== */
      @media (prefers-reduced-motion: reduce) {
        .sidebar,
        .sidebar.open {
          transition: none;
        }
        .animate-fade-in,
        .animate-slide-up {
          animation: none;
        }
      }
      
      .nav-group-title {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
      }
      .nav-group-title svg {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        opacity: 0.7;
      }

      /* ========================================
         RESPONSIVE
         ======================================== */
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
          transition: transform var(--transition-normal);
        }
        
        .sidebar.open {
          transform: translateX(0);
        }
        
        @media (prefers-reduced-motion: reduce) {
          .sidebar { transition: none; }
        }
        
        .sidebar-overlay.open {
          display: block;
        }
        
        .sidebar-toggle {
          display: flex;
        }
        
        .app-main {
          margin-left: 0;
        }
        
        main {
          padding: var(--space-md);
          padding-top: 60px;
        }
        
        .card {
          padding: var(--space-md);
        }
        
        .btn {
          width: 100%;
          justify-content: center;
        }
      }
      
      @media (max-width: 480px) {
        :root {
          --text-base: 0.9375rem;
        }
        
        .sidebar-header h1 {
          font-size: var(--text-lg);
        }
        
        .nav-group a {
          padding: var(--space-sm);
          font-size: var(--text-xs);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Open menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/" class="logo-link">
            <div class="logo-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </div>
            <h1>LinkedIn Copilot</h1>
          </a>
        </div>
        <div id="notification-strip" class="notification-strip" aria-live="polite" aria-label="Next action" role="region" style="display: none;">
          <p class="notification-strip-message" id="notification-strip-message"></p>
          <a href="#" id="notification-strip-cta" class="notification-strip-cta">Process All Pending</a>
        </div>
        <nav class="sidebar-nav" aria-label="Main navigation">
          <div class="nav-group">
            <a href="/" class="nav-group-link {% if is_home is defined and is_home %}active{% endif %}" {% if is_home is defined and is_home %}aria-current="page"{% endif %}>Home</a>
            <a href="/getting-started" class="nav-group-link {% if request.path == '/getting-started' %}active{% endif %}" {% if request.path == '/getting-started' %}aria-current="page"{% endif %}>Getting started</a>
          </div>
          <div class="nav-group">
            <div class="nav-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</div>
            <div class="nav-group-sub">
              <a href="/profile?section=linkedin" {% if request.path == '/profile' and (profile_section is not defined or profile_section == 'linkedin') %}class="active"{% endif %}>LinkedIn Connection</a>
              <a href="/profile?section=cv" {% if request.path == '/profile' and profile_section is defined and profile_section == 'cv' %}class="active"{% endif %}>CV / Resume</a>
            </div>
          </div>
          <div class="nav-group">
            <div class="nav-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Search</div>
            <div class="nav-group-sub">
              <a href="/?tab=search" {% if search_tab is defined and search_tab == 'search' %}class="active"{% endif %}>Search</a>
              <a href="/?tab=careers" {% if search_tab is defined and search_tab == 'careers' %}class="active"{% endif %}>Careers</a>
            </div>
          </div>
          <div class="nav-group">
            <div class="nav-group-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Jobs</div>
            <div class="nav-group-sub">
              <a href="/jobs" {% if request.path == '/jobs' %}class="active"{% endif %}>
                <span>Jobs List</span>
                <span class="nav-badge" id="nav-badge-jobs" style="display:none;" aria-label="Jobs waiting to be handled"></span>
              </a>
              <a href="/careers/review" {% if request.path == '/careers/review' %}class="active"{% endif %}>
                <span>Review pulled</span>
                <span class="nav-badge" id="nav-badge-review" style="display:none;" aria-label="Pulled jobs pending review"></span>
              </a>
            </div>
          </div>
        </nav>
      </aside>
      <div class="app-main">
        <a href="#main-content" class="skip-link">Skip to main content</a>
        <main id="main-content" class="animate-fade-in" tabindex="-1">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    <script>
      (function() {
        var toggle = document.getElementById('sidebar-toggle');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebar-overlay');
        var nav = sidebar ? sidebar.querySelector('.sidebar-nav') : null;
        function getFocusables() {
          return nav ? Array.prototype.slice.call(nav.querySelectorAll('a[href]')).filter(function(a) { return a.offsetParent !== null; }) : [];
        }
        function open() {
          sidebar.classList.add('open');
          overlay.classList.add('open');
          overlay.setAttribute('aria-hidden', 'false');
          toggle.setAttribute('aria-label', 'Close menu');
          toggle.setAttribute('aria-expanded', 'true');
          var focusables = getFocusables();
          if (focusables.length) focusables[0].focus();
        }
        function close() {
          sidebar.classList.remove('open');
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
          toggle.setAttribute('aria-label', 'Open menu');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.focus();
        }
        if (toggle) toggle.addEventListener('click', function() {
          if (sidebar.classList.contains('open')) close(); else open();
        });
        if (overlay) overlay.addEventListener('click', close);
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && sidebar && sidebar.classList.contains('open')) { close(); return; }
          if (e.key !== 'Tab' || !sidebar || !sidebar.classList.contains('open') || !nav) return;
          var focusables = getFocusables();
          if (focusables.length === 0) return;
          var first = focusables[0];
          var last = focusables[focusables.length - 1];
          if (e.shiftKey) {
            if (document.activeElement === first) { e.preventDefault(); last.focus(); }
          } else {
            if (document.activeElement === last) { e.preventDefault(); first.focus(); }
          }
        });
      })();

      (function() {
        function formatBadgeCount(count) {
          if (!count || count <= 0) return "";
          if (count > 99) return "99+";
          return String(count);
        }

        async function fetchNavBadges() {
          try {
            const resp = await fetch('/api/badges');
            if (!resp.ok) return;
            const data = await resp.json();
            const jobsEl = document.getElementById('nav-badge-jobs');
            const reviewEl = document.getElementById('nav-badge-review');
            if (jobsEl) {
              const value = formatBadgeCount(data.jobs_pending);
              if (value) {
                jobsEl.textContent = value;
                jobsEl.style.display = 'inline-flex';
              } else {
                jobsEl.textContent = '';
                jobsEl.style.display = 'none';
              }
            }
            if (reviewEl) {
              const value = formatBadgeCount(data.review_pending);
              if (value) {
                reviewEl.textContent = value;
                reviewEl.style.display = 'inline-flex';
              } else {
                reviewEl.textContent = '';
                reviewEl.style.display = 'none';
              }
            }
            var strip = document.getElementById('notification-strip');
            var stripMsg = document.getElementById('notification-strip-message');
            var stripCta = document.getElementById('notification-strip-cta');
            if (strip && stripMsg && stripCta && data.suggested_action) {
              stripMsg.textContent = data.suggested_action.message || '';
              stripCta.textContent = data.suggested_action.label || 'Go';
              stripCta.href = data.suggested_action.url || '#';
              strip.classList.add('visible');
              strip.style.display = 'block';
            } else if (strip) {
              strip.classList.remove('visible');
              strip.style.display = 'none';
            }
          } catch (e) {
            console.debug && console.debug('Failed to load nav badges', e);
            var strip = document.getElementById('notification-strip');
            if (strip) { strip.classList.remove('visible'); strip.style.display = 'none'; }
          }
        }

        window.refreshNavBadges = fetchNavBadges;

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fetchNavBadges);
        } else {
          fetchNavBadges();
        }
      })();

      /**
       * Update unified job progress component.
       * @param {string} containerId - ID of the .job-progress container
       * @param {Object} data - { running, phase?, total?, completed?, currentItem?, countLabel?, detailLabel? }
       *   - running: boolean, show/hide container
       *   - phase: title/phase text (e.g. "Scraping...", "Matching...")
       *   - total, completed: numbers for bar and default count text
       *   - countLabel: override for count text (e.g. "5 / 10 searches")
       *   - currentItem / detailLabel: detail line text
       */
      window.updateJobProgress = function(containerId, data) {
        var el = document.getElementById(containerId);
        if (!el) return;
        var running = !!data.running;
        el.style.display = running ? 'block' : 'none';
        if (!running) return;
        var title = el.querySelector('.job-progress__title');
        var count = el.querySelector('.job-progress__count');
        var barContainer = el.querySelector('.job-progress__bar-container');
        var bar = el.querySelector('.job-progress__bar');
        var detail = el.querySelector('.job-progress__detail');
        if (title && data.phase !== undefined) title.textContent = data.phase;
        var total = data.total != null ? Number(data.total) : 0;
        var completed = data.completed != null ? Number(data.completed) : 0;
        if (count) {
          count.textContent = data.countLabel != null ? data.countLabel : (completed + ' / ' + total);
        }
        var pct = total > 0 ? Math.min(100, (completed / total) * 100) : 0;
        if (bar) {
          bar.style.width = pct + '%';
          bar.classList.toggle('job-progress__bar--scraping', data.phase === 'scraping');
        }
        if (barContainer) {
          barContainer.setAttribute('aria-valuenow', Math.round(pct));
          barContainer.setAttribute('aria-valuemax', 100);
          barContainer.setAttribute('aria-valuemin', 0);
        }
        var detailText = data.detailLabel != null ? data.detailLabel : (data.currentItem || '');
        if (detail) detail.textContent = detailText;
      };
    </script>
  </body>
</html>
