{% extends "base.html" %}

{% block content %}
  <style>
    .review-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
      gap: var(--space-md);
      position: relative;
      z-index: 1;
    }
    .review-page-header h1 {
      font-size: var(--text-2xl);
      font-weight: 700;
      margin: 0;
    }
    .review-back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: var(--text-sm);
    }
    .review-back-link:hover {
      color: var(--accent-primary);
      text-decoration: none;
    }
    .runs-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }
    .run-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .run-card:hover {
      border-color: var(--border-default);
      box-shadow: var(--shadow-md);
    }
    .run-card.selected {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px var(--accent-primary);
    }
    .run-card-info h3 {
      margin: 0 0 var(--space-xs) 0;
      font-size: var(--text-lg);
      font-weight: 600;
    }
    .run-card-meta {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .run-card-badge {
      display: inline-flex;
      align-items: center;
      padding: var(--space-xs) var(--space-sm);
      background: var(--accent-info);
      color: var(--text-inverse);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 600;
    }
    .empty-runs {
      text-align: center;
      padding: var(--space-2xl);
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px dashed var(--border-default);
    }
    .empty-runs a {
      color: var(--accent-primary);
    }
    .job-list-section {
      margin-top: var(--space-xl);
      display: none;
    }
    .job-list-section.visible {
      display: block;
    }
    .job-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }
    .job-list-header h2 {
      margin: 0;
      font-size: var(--text-xl);
      font-weight: 600;
    }
    .job-toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }
    .staging-table-container {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      overflow-x: auto;
    }
    .staging-table {
      width: 100%;
      border-collapse: collapse;
    }
    .staging-table th,
    .staging-table td {
      padding: var(--space-sm) var(--space-md);
      text-align: left;
      border-bottom: 1px solid var(--border-subtle);
    }
    .staging-table th {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--bg-secondary);
    }
    .staging-table tr:last-child td {
      border-bottom: none;
    }
    .staging-table tbody tr:hover {
      background: var(--bg-hover);
    }
    .staging-table td a {
      color: var(--accent-primary);
      text-decoration: none;
    }
    .staging-table td a:hover {
      text-decoration: underline;
    }
    .source-badge {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .source-greenhouse { background: rgba(46, 204, 113, 0.2); color: #4ade80; }
    .source-lever { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
    .source-workday { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
    .source-linkedin { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .loading-state {
      text-align: center;
      padding: var(--space-xl);
      color: var(--text-muted);
    }
    .btn-spinner {
      animation: spin 0.8s linear infinite;
      border: 2px solid var(--border-default);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <div class="review-page-header">
    <h1>Review pulled jobs</h1>
    <a href="/" class="review-back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to Search
    </a>
  </div>

  <div id="runs-container">
    <div id="runs-loading" class="loading-state">Loading runs…</div>
    <div id="runs-list" class="runs-list" style="display:none;"></div>
    <div id="runs-empty" class="empty-runs" style="display:none;">
      <p>No pulled jobs to review.</p>
      <p><a href="/">Go to Search</a> → Careers tab to pull jobs from company career sites.</p>
    </div>
  </div>

  <div id="job-list-section" class="job-list-section">
    <div class="job-list-header">
      <h2 id="job-list-title">Jobs from <span id="run-company-name"></span></h2>
      <div class="job-toolbar">
        <button type="button" class="btn btn-small" id="select-all-btn">Select all</button>
        <button type="button" class="btn btn-small" id="clear-selection-btn">Clear selection</button>
        <button type="button" class="btn btn-gradient" id="approve-selected-btn" disabled>
          Approve selected (<span id="selected-count">0</span>)
        </button>
        <button type="button" class="btn" id="discard-run-btn" style="color:var(--accent-danger);">Discard run</button>
      </div>
    </div>
    <div id="job-list-loading" class="loading-state" style="display:none;">Loading jobs…</div>
    <div id="job-list-table-wrap" class="staging-table-container" style="display:none;">
      <table class="staging-table">
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" id="select-all-cb" title="Select all"/></th>
            <th>Title</th>
            <th>Company</th>
            <th>Location</th>
            <th>Source</th>
            <th>Date found</th>
          </tr>
        </thead>
        <tbody id="job-list-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    (function() {
      let runs = [];
      let selectedRunId = null;
      let runJobs = [];
      let selectedIds = new Set();

      function escapeHtml(s) {
        if (s == null) return '';
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function formatRelativeTime(d) {
        if (!d) return '';
        const date = new Date(d);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return diffMins + 'm ago';
        if (diffHours < 24) return diffHours + 'h ago';
        if (diffDays < 7) return diffDays + 'd ago';
        return date.toLocaleDateString();
      }

      async function loadRuns() {
        const loading = document.getElementById('runs-loading');
        const listEl = document.getElementById('runs-list');
        const emptyEl = document.getElementById('runs-empty');
        try {
          const resp = await fetch('/api/careers/runs?pending_only=true&limit=50');
          const data = await resp.json();
          runs = data.runs || [];
          loading.style.display = 'none';
          if (runs.length === 0) {
            listEl.style.display = 'none';
            emptyEl.style.display = 'block';
            return;
          }
          emptyEl.style.display = 'none';
          listEl.style.display = 'flex';
          listEl.innerHTML = runs.map(r => `
            <div class="run-card" data-run-id="${r.id}" data-company-id="${r.company_id}">
              <div class="run-card-info">
                <h3>${escapeHtml(r.company_name || 'Company')}</h3>
                <div class="run-card-meta">
                  ${formatRelativeTime(r.scraped_at)} · ${r.total_found} found, ${r.new_count} new
                </div>
              </div>
              <span class="run-card-badge" title="${r.pending_count} jobs pending review">${r.pending_count} pending</span>
            </div>
          `).join('');
          listEl.querySelectorAll('.run-card').forEach(el => {
            el.addEventListener('click', () => selectRun(parseInt(el.dataset.runId, 10)));
          });
        } catch (err) {
          console.error(err);
          loading.innerHTML = '<span style="color:var(--accent-error)">Failed to load runs</span>';
        }
      }

      async function selectRun(runId) {
        selectedRunId = runId;
        selectedIds.clear();
        document.querySelectorAll('.run-card').forEach(c => { c.classList.remove('selected'); });
        const card = document.querySelector('.run-card[data-run-id="' + runId + '"]');
        if (card) card.classList.add('selected');

        const section = document.getElementById('job-list-section');
        section.classList.add('visible');
        document.getElementById('job-list-table-wrap').style.display = 'none';
        document.getElementById('job-list-loading').style.display = 'block';

        try {
          const resp = await fetch('/api/careers/runs/' + runId + '/jobs');
          const data = await resp.json();
          if (data.error) {
            document.getElementById('job-list-loading').textContent = data.error;
            return;
          }
          runJobs = data.jobs || [];
          document.getElementById('run-company-name').textContent = data.company_name || 'Company';
          document.getElementById('job-list-loading').style.display = 'none';
          document.getElementById('job-list-table-wrap').style.display = 'block';
          renderJobRows();
          updateApproveButton();
        } catch (err) {
          console.error(err);
          document.getElementById('job-list-loading').textContent = 'Failed to load jobs';
        }
      }

      function renderJobRows() {
        const tbody = document.getElementById('job-list-tbody');
        tbody.innerHTML = runJobs.map(j => {
          const dateFound = j.date_found ? new Date(j.date_found).toLocaleDateString() : '';
          const sourceClass = 'source-' + (j.source || 'linkedin').toLowerCase();
          const checked = selectedIds.has(j.id) ? ' checked' : '';
          return `
            <tr>
              <td><input type="checkbox" class="job-cb" data-id="${j.id}"${checked}/></td>
              <td><a href="${escapeHtml(j.url)}" target="_blank" rel="noopener">${escapeHtml(j.title)}</a></td>
              <td>${escapeHtml(j.company)}</td>
              <td>${escapeHtml(j.location)}</td>
              <td><span class="source-badge ${sourceClass}">${escapeHtml(j.source || '')}</span></td>
              <td>${escapeHtml(dateFound)}</td>
            </tr>
          `;
        }).join('');
        tbody.querySelectorAll('.job-cb').forEach(cb => {
          cb.addEventListener('change', () => {
            if (cb.checked) selectedIds.add(parseInt(cb.dataset.id, 10));
            else selectedIds.delete(parseInt(cb.dataset.id, 10));
            updateApproveButton();
          });
        });
      }

      function updateApproveButton() {
        const n = selectedIds.size;
        document.getElementById('selected-count').textContent = n;
        document.getElementById('approve-selected-btn').disabled = n === 0;
      }

      document.getElementById('select-all-cb').addEventListener('change', function() {
        if (this.checked) {
          runJobs.forEach(j => selectedIds.add(j.id));
        } else {
          selectedIds.clear();
        }
        renderJobRows();
        updateApproveButton();
      });

      document.getElementById('select-all-btn').addEventListener('click', () => {
        runJobs.forEach(j => selectedIds.add(j.id));
        renderJobRows();
        updateApproveButton();
      });

      document.getElementById('clear-selection-btn').addEventListener('click', () => {
        selectedIds.clear();
        document.getElementById('select-all-cb').checked = false;
        renderJobRows();
        updateApproveButton();
      });

      document.getElementById('approve-selected-btn').addEventListener('click', async () => {
        if (!selectedRunId || selectedIds.size === 0) return;
        const btn = document.getElementById('approve-selected-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="btn-spinner" style="width:16px;height:16px;display:inline-block;"></span> Approving…';
        try {
          const resp = await fetch('/api/careers/runs/' + selectedRunId + '/approve', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ job_ids: Array.from(selectedIds) }),
          });
          const data = await resp.json();
          if (data.success) {
            const msg = data.approved + ' job(s) added to Jobs.';
            if (data.skipped_duplicates > 0) msg += ' ' + data.skipped_duplicates + ' skipped (already in list).';
            if (typeof showNotification === 'function') showNotification(msg, 'success');
            else alert(msg);
            selectedIds.clear();
            await loadRuns();
            await selectRun(selectedRunId);
            if (window.refreshNavBadges) {
              window.refreshNavBadges();
            }
          } else {
            if (typeof showNotification === 'function') showNotification(data.error || 'Approve failed', 'error');
            else alert(data.error || 'Approve failed');
          }
        } catch (err) {
          if (typeof showNotification === 'function') showNotification('Request failed', 'error');
          else alert('Request failed');
        }
        btn.disabled = false;
        btn.innerHTML = 'Approve selected (<span id="selected-count">0</span>)';
        document.getElementById('selected-count').textContent = selectedIds.size;
      });

      document.getElementById('discard-run-btn').addEventListener('click', async () => {
        if (!selectedRunId) return;
        if (!confirm('Discard all pending jobs in this run? They will not be added to your Jobs list.')) return;
        try {
          const resp = await fetch('/api/careers/runs/' + selectedRunId + '/discard', { method: 'POST' });
          const data = await resp.json();
          if (data.success) {
            if (typeof showNotification === 'function') showNotification('Run discarded', 'success');
            selectedRunId = null;
            document.getElementById('job-list-section').classList.remove('visible');
            await loadRuns();
            if (window.refreshNavBadges) {
              window.refreshNavBadges();
            }
          } else {
            if (typeof showNotification === 'function') showNotification(data.error || 'Discard failed', 'error');
            else alert(data.error || 'Discard failed');
          }
        } catch (err) {
          if (typeof showNotification === 'function') showNotification('Request failed', 'error');
          else alert('Request failed');
        }
      });

      loadRuns();
    })();
  </script>
{% endblock %}
